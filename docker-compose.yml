
services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "7842:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://permitpilot:${DB_PASSWORD}@postgres:5432/permitpilot
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - REDIS_URL=redis://redis:6379
      - SESSION_SECRET=${SESSION_SECRET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PRICE_CONTRACTOR=${STRIPE_PRICE_CONTRACTOR}
      - STRIPE_PRICE_AGENCY=${STRIPE_PRICE_AGENCY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - GOOGLE_PLACES_API_KEY=${GOOGLE_PLACES_API_KEY}
      - GOOGLE_GEOCODING_API_KEY=${GOOGLE_GEOCODING_API_KEY}
      - FRONTEND_URL=${FRONTEND_URL}
      - PORT=3000
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=permitpilot
      - POSTGRES_USER=permitpilot
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://permitpilot:${DB_PASSWORD}@postgres:5432/permitpilot
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
